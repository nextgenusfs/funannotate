[workspace]
channels = ["conda-forge", "bioconda"]
name = "funannotate"
platforms = ["linux-64"]
version = "1.9.0"

[tasks]
# Build custom Rust-optimized externals (EVM, PASA, Trinity) and bowtie2 from
# source into the active env. Run once after `pixi install`:  pixi run install-externals
# These are heavy source builds, so they are deliberately NOT run on every
# activation (activation scripts are sourced on every `pixi run`/`pixi shell`).
install-evm = { cmd = "bash install_scripts/pixi_install_evm.sh", description = "Build & install Rust EVidenceModeler into the env" }
install-pasa = { cmd = "bash install_scripts/pixi_install_pasa.sh", description = "Build & install Rust PASA into the env" }
install-trinity = { cmd = "bash install_scripts/pixi_install_trinity.sh", description = "Build & install Rust Trinity into the env" }
install-bowtie2 = { cmd = "bash install_scripts/pixi_install_bowtie2.sh", description = "Build bowtie2 from source to fix AVX2 runtime fallback issues" }
install-externals = { depends-on = ["install-evm", "install-pasa", "install-trinity", "install-bowtie2"], description = "Build all custom externals (EVM, PASA, Trinity, bowtie2)" }

[activation]
# Activation stays fast and side-effect-free: env vars (below) plus one cheap
# symlink. The heavy source builds live in [tasks] -- run them once with
# `pixi run install-externals`.
scripts = ["install_scripts/pixi_setup_symlinks.sh"]

[activation.env]
CONDA_PREFIX = "${PIXI_PROJECT_ROOT}/.pixi/envs/default"
TRINITY_HOME = "${CONDA_PREFIX}/opt/trinityrnaseq"
TRINITYHOME = "${CONDA_PREFIX}/opt/trinityrnaseq"
PASAHOME = "${CONDA_PREFIX}/opt/pasa/src"
EVM_HOME = "${CONDA_PREFIX}/opt/evm"
FUNANNOTATE_EVM_ENGINE = "rust"

[dependencies]
blast = ">=2.16.0,<3"
repeatmasker = ">=4.2.3,<5"
repeatmodeler = ">=1.0.8,<2"
miniprot = ">=0.18,<0.19"
minimap2 = ">=2.30,<3"
exonerate = ">=2.4.0,<3"
hmmer = ">=3.4,<4"
python = ">=3.6,<3.9"
biopython = "<1.80"
xlrd = "==1.2.0"
codingquarry = "==2.0"
augustus = ">=3.5.0"
proteinortho = ">=6.3.6,<7"
goatools = ">=1.4.12,<2"
matplotlib-base = ">=3.7.3,<4"
natsort = ">=8.4.0,<9"
numpy = ">=1.24.4,<2"
pigz = ">=2.8,<3"
tantan = ">=51,<52"
bedtools = ">=2.31.1,<3"
diamond = ">=2.0.5"
tbl2asn = ">=25.7,<26"
blat = ">=35,<36"
trnascan-se = ">=2.0"
ucsc-pslcdnafilter = ">=482,<483"
trimmomatic = ">=0.40,<0.41"
fastp = ">=0.23,<1"
raxml = ">=8.2.13,<9"
iqtree = ">=3.1.1,<4"
trimal = ">=1.5.1,<2"
mafft = ">=7"
hisat2 = ">=2.2.2,<3"
kallisto = "==0.46.1"
stringtie = ">=3.0.3,<4"
salmon = ">=1.0"
samtools = ">=1.9"
glimmerhmm = ">=3.0.4,<4"
bamtools = ">=2.5.3,<3"
perl-yaml = ">=1.30,<2"
perl-file-which = ">=1.24,<2"
perl-local-lib = ">=2.29,<3"
perl-dbd-mysql = ">=5.13,<6"
perl-clone = ">=0.46,<0.47"
perl-hash-merge = ">=0.302,<0.303"
perl-soap-lite = ">=1.27,<2"
perl-json = ">=4.11,<5"
perl-logger-simple = ">=2.0,<3"
perl-scalar-util-numeric = ">=0.40,<0.41"
perl-math-utils = ">=1.14,<2"
perl-mce = ">=1.902,<2"
ete3 = ">=3.1.3,<4"
perl-text-soundex = ">=3.5,<4"
perl-parallel-forkmanager = ">=2.4,<3"
perl-db-file = ">=1.855,<2"
distro = ">=1.9.0,<2"
repeatscout = ">=1.0.7,<2"
recon = ">=1.8,<2"
fasta3 = ">=36.3.8,<37"
rust = ">=1.80"
# Build toolchain for the source-built Rust/C++ components (trinity/pasa/evm
# rust_optimize forks) -- see scripts/pixi_install_{trinity,pasa,evm}_rust.sh.
# c-compiler/cxx-compiler are conda-forge's compiler *activation*
# metapackages (pull gcc_linux-64/gxx_linux-64 and wire up $CC/$CXX/sysroot),
# not the bare gcc/gxx runtime metapackages.
c-compiler = "*"
cxx-compiler = "*"
make = ">=4"
cmake = ">=3.20"
autoconf = ">=2.69"
automake = ">=1.16"
libtool = ">=2.4"
zlib = ">=1.2"
bzip2 = ">=1.0"
libffi = ">=3.5.2,<4"
sqlite = "*"
snap = { version = ">=2017_3_1,<2018", channel = "bioconda" }
gmap = { version = ">=2025.7.31,<2026", channel = "bioconda" }
eggnog-mapper = { version = ">=2.1.13,<3", channel = "bioconda" }
perl-dbd-sqlite = ">=1.78,<2"
kmer-jellyfish = ">=2.3.0,<3"

# Trinity (trinity_rust) runtime deps not otherwise pulled in
openjdk = ">=17"
bowtie2 = ">=2.3.0,<3"
coreutils = "*"
libgomp = "*"
r-base = "*"
r-cluster = "*"
r-gplots = "*"
r-fastcluster = "*"
r-argparse = "*"
r-ape = "*"
r-phangorn = "*"
r-tidyverse = "*"
r-sm = "*"
r-vioplot = "*"
bioconductor-qvalue = "*"
bioconductor-ctc = "*"
bioconductor-edger = "*"
bioconductor-goseq = "*"
"bioconductor-go.db" = "*"
bioconductor-dexseq = "*"

# EVidenceModeler runtime deps not otherwise pulled in
perl-carp = "*"
perl-uri = "*"
perl-dbi = "*"

# PASA runtime deps not otherwise pulled in
ucsc-blat = "*"
lighttpd = "*"
pblat = ">=2.5,<3"
transdecoder = ">=6.0.0,<7"

[pypi-dependencies]
# Local editable install so working-tree edits take effect immediately in the CLI.
# To restore reproducible builds from the pinned git branch, comment out the
# editable line and uncomment the git line below, then run `pixi install`.
funannotate = { path = ".", editable = true }
